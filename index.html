<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РОВНЫЙ ПУЛЬС</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0e27;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        h1 {
            font-size: 4rem;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
            margin-bottom: 50px;
            letter-spacing: 10px;
        }
        
        .ecg-container {
            width: 80%;
            max-width: 1200px;
            height: 200px;
            position: relative;
            overflow: hidden;
        }
        
        .ecg-line {
            position: absolute;
            width: 200%;
            height: 100%;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
        
        .pulse-path {
            fill: none;
            stroke: #00ff41;
            stroke-width: 3;
            filter: drop-shadow(0 0 8px rgba(0, 255, 65, 0.8));
            animation: movePulse 4s linear infinite;
        }
        
        @keyframes movePulse {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>
    <h1>РОВНЫЙ ПУЛЬС</h1>
    <div class="ecg-container">
        <div class="grid"></div>
        <div class="ecg-line">
            <svg viewBox="0 0 2400 200" preserveAspectRatio="none">
                <path class="pulse-path" d="
                    M 0 100 
                    L 200 100 
                    L 220 100 
                    L 230 60 
                    L 240 140 
                    L 250 80 
                    L 260 100 
                    L 280 100
                    L 480 100
                    L 500 100 
                    L 510 60 
                    L 520 140 
                    L 530 80 
                    L 540 100 
                    L 560 100
                    L 760 100
                    L 780 100 
                    L 790 60 
                    L 800 140 
                    L 810 80 
                    L 820 100 
                    L 840 100
                    L 1040 100
                    L 1060 100 
                    L 1070 60 
                    L 1080 140 
                    L 1090 80 
                    L 1100 100 
                    L 1120 100
                    L 1320 100
                    L 1340 100 
                    L 1350 60 
                    L 1360 140 
                    L 1370 80 
                    L 1380 100 
                    L 1400 100
                    L 1600 100
                    L 1620 100 
                    L 1630 60 
                    L 1640 140 
                    L 1650 80 
                    L 1660 100 
                    L 1680 100
                    L 1880 100
                    L 1900 100 
                    L 1910 60 
                    L 1920 140 
                    L 1930 80 
                    L 1940 100 
                    L 1960 100
                    L 2160 100
                    L 2180 100 
                    L 2190 60 
                    L 2200 140 
                    L 2210 80 
                    L 2220 100 
                    L 2400 100
                "/>
            </svg>
        </div>
    </div>
</body>
</html>
